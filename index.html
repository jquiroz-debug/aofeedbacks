<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Feedback — HubSpot Academy (Live)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #f5f6f8; color: #1b2733; line-height: 1.45; font-size: 14px; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 18px 60px; }
  h1 { font-size: 22px; margin: 0 0 2px; font-weight: 700; }
  .sub { color: #5a6b7b; font-size: 13px; margin: 0 0 18px; }
  .orange { color: #ff7a59; }
  .card { background: #fff; border: 1px solid #e1e6eb; border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; margin: 0 0 14px; font-weight: 700; }
  .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:#fff; border:1px solid #e1e6eb; border-radius:12px; padding:12px 16px; margin-bottom:18px; position:sticky; top:0; z-index:5; }
  .toolbar label { font-size:12px; color:#5a6b7b; font-weight:600; }
  .toolbar select { padding:7px 10px; border:1px solid #d3dae1; border-radius:8px; font-size:13px; background:#fff; color:#1b2733; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi { background: #fff; border: 1px solid #e1e6eb; border-radius: 12px; padding: 14px 16px; }
  .kpi .v { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .kpi .l { font-size: 12px; color: #5a6b7b; margin-top: 3px; }
  .kpi .s { font-size: 11px; color: #8a98a6; margin-top: 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 820px){ .grid2 { grid-template-columns: 1fr; } }
  .chart-box { position: relative; height: 280px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
  .bar-row .name { width: 170px; font-size: 13px; flex-shrink: 0; }
  .bar-track { flex: 1; background: #eef1f4; border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: #ff7a59; }
  .bar-row .num { width: 120px; text-align: right; font-size: 12px; color: #5a6b7b; flex-shrink: 0; }
  .pill { display:inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pos { background: #e3f5ec; color: #138a52; } .neg { background: #fde8e6; color: #c0392b; } .neu { background: #eef1f4; color: #5a6b7b; }
  .hl-head { font-weight:700; font-size:13px; margin-bottom:9px; } .hl-head.pos { color:#138a52; } .hl-head.neg { color:#c0392b; }
  ul.hl { margin:0; padding-left:18px; } ul.hl li { margin:0 0 8px; font-size:13px; color:#42526b; }
  .recgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:820px){ .recgrid { grid-template-columns:1fr; } }
  .recbox { border:1px solid #e1e6eb; border-left:4px solid #ccc; border-radius:10px; padding:13px 15px; cursor:pointer; transition:box-shadow .15s; background:#fff; }
  .recbox:hover { box-shadow:0 2px 10px rgba(0,0,0,.07); }
  .recbox.high { border-left-color:#e74c3c; } .recbox.medium { border-left-color:#ffb02e; } .recbox.low { border-left-color:#00bda5; }
  .recbox-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .prio-pill { font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; }
  .prio-pill.high { background:#fde8e6; color:#c0392b; } .prio-pill.medium { background:#fff3d6; color:#a86700; } .prio-pill.low { background:#e3f5ec; color:#138a52; }
  .rectitle { font-weight:700; font-size:13.5px; } .recwhy { font-size:11px; color:#8a98a6; margin-bottom:5px; } .recdetail-text { font-size:13px; color:#4a5b6b; } .recmore { font-size:11.5px; color:#ff7a59; font-weight:600; margin-top:9px; } .rec-detail { margin-top:11px; border-top:1px dashed #e1e6eb; padding-top:10px; display:none; }
  .profgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:11px; }
  .profbox { border:1px solid #e1e6eb; border-radius:10px; padding:12px 13px; cursor:pointer; transition:box-shadow .15s; background:#fff; }
  .profbox:hover { box-shadow:0 2px 10px rgba(0,0,0,.07); } .profbox.sel { border-color:#ff7a59; box-shadow:0 0 0 2px rgba(255,122,89,.18); }
  .profbox .pname { font-weight:700; font-size:14px; } .profbox .pmeta { font-size:11.5px; color:#5a6b7b; margin-top:3px; }
  .profbox .pbar { height:6px; border-radius:4px; background:#eef1f4; margin-top:9px; overflow:hidden; } .profbox .pbar > div { height:100%; background:#00bda5; }
  #bragDetail { margin-top:16px; } .brag-detail-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .quote { border-left: 3px solid #e1e6eb; padding: 6px 0 6px 12px; margin: 0 0 12px; font-size: 13px; } .quote .meta { color: #8a98a6; font-size: 11px; margin-top: 3px; }
  .detractor { border-left-color: #e74c3c; background: #fef6f5; padding: 8px 12px; border-radius: 0 8px 8px 0; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items:center; }
  .controls select, .controls input { padding: 7px 10px; border: 1px solid #d3dae1; border-radius: 8px; font-size: 13px; background: #fff; color: #1b2733; }
  .controls input { flex: 1; min-width: 160px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid #eef1f4; font-size: 13px; vertical-align: top; }
  th { color: #5a6b7b; font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; }
  td.cmt { max-width: 480px; }
  .muted { color: #8a98a6; }
  .btn { background:#ff7a59;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer; }
  .btn.ghost { background:#fff; color:#42526b; border:1px solid #d3dae1; }
  .btn.ghost.copy { padding:5px 11px; font-size:12px; }
  .ai-note { font-size: 11px; color: #8a98a6; margin-top: 10px; }
  .empty { text-align:center; color:#8a98a6; padding:30px 10px; font-size:13px;}
  .err { background:#fde8e6;color:#c0392b;padding:14px 16px;border-radius:10px;font-size:13px; }
  .spinner { display:inline-block; width:16px;height:16px;border:2px solid #d3dae1;border-top-color:#ff7a59;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px;} @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Workshop Feedback <span class="orange">·</span> HubSpot Academy</h1>
  <p class="sub">Live view — data loads from the team Google Sheet on every open. <span id="period" class="muted"></span></p>
  <div id="content"><div class="card"><div class="empty"><span class="spinner"></span>Loading latest data…</div></div></div>
</div>

<script>
/* ===== CONFIG ===== */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyt0ji8oiFBRJsXxzDfaamp4PriWgTFzu9TwAyWAAKJTJ2k7I4aCXFrfxombO4Kus0frSzTRNN3LnQ/pub?gid=0&single=true&output=csv';

let PROFS = ['Julie','Troy','Ashley','Patrick','Eugene','Nicole','Elle'];
let DATE_FILTER = 'all';
function escapeReg(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
const PALETTE = ['#ff7a59','#00a4bd','#00bda5','#7c4dff','#f2547d','#516f90','#ffb84d','#0091ae'];
const THEMES = [
  { key:'Pacing & duration', kw:['pacing','pace','fire hose','too long','too much','rushed','time to practice','90 minute','three days','3 days','bite sized','bite-sized','fast','slow','dense','runs long','out of time'] },
  { key:'Clarity & structure', kw:['clear','clearly','easy to understand','hard to understand','confusing','structured','well structured','well-delivered','explain','explanation','organized','digestible','simple'] },
  { key:'Instructor & engagement', kw:['instructor','presenter','professor','prof','engaging','engage','patient','knowledgeable','knowable','energy','professional','helpful','answered','questions','interactive','fun'] },
  { key:'Content relevance', kw:['content','relevant','useful','informative','applicable','apply','takeaway','take aways','fundamentals','insightful','practical','value'] },
  { key:'Platform / technical', kw:['portal','platform','exercise','hiccup','kicked','technical','certification','login','bug','glitch','chat'] },
  { key:'Level & depth', kw:['advanced','advance','beginner','new','basic','repetitive','outdated','depth','deeper','overview','more advance','levels','general'] },
];
const DATE_OPTS = [['all','All time'],['this_month','Current month'],['last_month','Last month'],['this_quarter','Current quarter'],['last_quarter','Last quarter'],['this_year','Current year'],['last_year','Last year'],['last_30','Last 30 days'],['last_90','Last 90 days']];

const STATIC_SUMMARY = "Workshop satisfaction is very strong, driven by instructors repeatedly praised for patience, energy and live Q&A. The clearest opportunity is fit: the single 90-minute, one-size format runs dense for newcomers yet thin for experienced users — tiering content, tightening scope, and clarifying the 'why' behind each step would lift the lower-rated minority.";
const STATIC_RECS = [
  { priority:'high', title:'Offer tiered onboarding (Foundations vs. Advanced)', area:'Level & depth — one-size content frustrates both new and experienced users', survey:'All', detail:"Newcomers say it's 'so general and hard to understand to someone who has never worked with CRM,' while veterans were 'hoping for a more advance series.' Split each Hub bootcamp into a Foundations track (with short pre-work defining core CRM concepts) and an Advanced track for users with 1+ year in HubSpot." },
  { priority:'high', title:'Right-size the 90-minute scope or add overflow time', area:'Pacing & duration — sessions feel dense and run out of time', survey:'Smart CRM', detail:"Multiple comments: '90 minute format is a bit dense,' 'subjects are covered a bit too quickly,' 'drinking from a fire hose,' and 'it runs long or out of time.' Trim ~15–20% of breadth per session and protect hands-on time, or add an optional session to absorb overflow and questions." },
  { priority:'medium', title:'Add a chat moderator + structured Q&A block', area:'Engagement — live chat pulls the presenter’s attention', survey:'Smart CRM', detail:"An attendee noted 'the chat was distracting to the presenter; maybe a moderator who handles questions.' Staff a co-host to triage chat and run a timed Q&A so the lead instructor keeps flow without dropping questions." },
  { priority:'medium', title:"Teach the 'why', not just the 'how' — and define jargon", area:'Clarity — steps are shown without the outcome they achieve', survey:'Smart CRM', detail:"Feedback: the bootcamp 'showed how to set things up, but didn't do the best at showing what the steps achieved,' with undefined terms like 'group.' Frame each task with the business outcome it drives and define terms on first use." },
  { priority:'medium', title:"Tailor content to each attendee's hub & tier", area:'Relevance — features shown that attendees can’t access', survey:'All', detail:"'Not everyone has access to the same tools… some features were just for Marketing Hub users.' Pre-survey attendees' subscription tier and flag tool-gated features so people aren't shown capabilities they can't use." },
  { priority:'low', title:'Fix workshop sequencing & availability', area:'Scheduling — attendees can’t take sessions in the right order', survey:'Marketing', detail:"'Due to availability… I have not been able to do them in order… this affects being able to do the activities when they use something created in a previous workshop.' Run the sequence on a predictable cadence or release prerequisite recordings so hands-on activities aren't blocked." }
];

let FILE=null, RECORDS=[], FRECORDS=[], SURVEYS=[], LAST_RECS=[], selectedProf=null, charts={}, LOADED_AT=null;

function parseCSV(text){ if(text.charCodeAt(0)===0xFEFF)text=text.slice(1); const rows=[];let cur=[],f="",i=0,q=false; while(i<text.length){const c=text[i]; if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}else{if(c==='"'){q=true;i++;continue;}if(c===','){cur.push(f);f="";i++;continue;}if(c==='\r'){i++;continue;}if(c==='\n'){cur.push(f);rows.push(cur);cur=[];f="";i++;continue;}f+=c;i++;continue;}} if(f.length>0||cur.length>0){cur.push(f);rows.push(cur);} return rows.filter(r=>r.some(x=>(x||'').trim()!=='')); }
function detectMap(headers){ const lc=headers.map(h=>(h||'').toLowerCase()); const fn=(p)=>{for(const x of p){const i=lc.findIndex(h=>x(h));if(i>=0)return i;}return -1;}; return { survey:fn([h=>h==='survey_name',h=>h==='survey name',h=>h.includes('survey')&&!h.includes('id')&&!h.includes('date')]), date:fn([h=>h.includes('submission'),h=>h.includes('date')]), rating:fn([h=>h==='rating',h=>h.includes('rating'),h=>h.includes('classification'),h=>h.includes('score')]), comment:fn([h=>h==='comment',h=>h.includes('comment'),h=>h.includes('feedback')&&!h.includes('id')]), name:fn([h=>h.includes('email')]) }; }
function inferScale(v){ const n=v.map(x=>parseFloat(String(x).replace(/[^0-9.\-]/g,''))).filter(x=>!isNaN(x)); if(n.length<v.length*0.5)return{type:'text'}; const mx=Math.max(...n); if(mx<=2)return{type:'num',max:2}; if(mx<=5)return{type:'num',max:5}; return{type:'num',max:10}; }
function classify(raw,sc){ const s=String(raw||'').trim().toLowerCase(); if(sc.type==='text'||/[a-z]/.test(s.replace(/[^a-z]/g,''))){ if(/(very satisfied|satisfied|promoter|excellent|great|good|positive|happy|highly)/.test(s))return'pos'; if(/(dissatisf|unsatisf|detractor|poor|bad|negative|neutral|passive)/.test(s))return'neg'; return'neu'; } const v=parseFloat(s.replace(/[^0-9.\-]/g,'')); if(isNaN(v))return'neu'; if(sc.max===2)return v>=2?'pos':'neg'; if(sc.max===5)return v>=4?'pos':(v>=3?'neu':'neg'); return v>=9?'pos':(v>=7?'neu':'neg'); }
function buildRecords(){ RECORDS=[]; if(!FILE)return; const m=FILE.map; const sc=inferScale(FILE.rows.map(r=>m.rating>=0?r[m.rating]:'')); FILE.rows.forEach(r=>{ const comment=m.comment>=0?(r[m.comment]||'').trim():''; const ratingRaw=m.rating>=0?r[m.rating]:''; const dr=m.date>=0?r[m.date]:''; const d=dr?new Date(dr):null; const vd=d&&!isNaN(d.getTime())?d:null; let survey=m.survey>=0?(r[m.survey]||'').trim():''; if(!survey)survey='All responses'; let instructor='Not mentioned'; if(comment){for(const n of PROFS){if(new RegExp('\\b'+escapeReg(n)+'\\b','i').test(comment)){instructor=n;break;}}} RECORDS.push({survey,comment,ratingRaw,sentiment:classify(ratingRaw,sc),date:vd,month:vd?vd.toISOString().slice(0,7):null,instructor}); }); }
function inDateRange(d,f){ if(!d)return f==='all'; const now=new Date(),y=d.getFullYear(),m=d.getMonth(),ny=now.getFullYear(),nm=now.getMonth(),q=Math.floor(m/3),nq=Math.floor(nm/3); switch(f){case'all':return true;case'this_month':return y===ny&&m===nm;case'last_month':{const lm=new Date(ny,nm-1,1);return y===lm.getFullYear()&&m===lm.getMonth();}case'this_quarter':return y===ny&&q===nq;case'last_quarter':{let ly=ny,lq=nq-1;if(lq<0){lq=3;ly--;}return y===ly&&q===lq;}case'this_year':return y===ny;case'last_year':return y===ny-1;case'last_30':return(now-d)<=30*864e5;case'last_90':return(now-d)<=90*864e5;default:return true;} }
function applyDateFilter(){ FRECORDS=RECORDS.filter(r=>inDateRange(r.date,DATE_FILTER)); const seen={}; FRECORDS.forEach(r=>{seen[r.survey]=(seen[r.survey]||0)+1;}); SURVEYS=Object.keys(seen).sort((a,b)=>seen[b]-seen[a]); }
function surveyColor(s){ const i=SURVEYS.indexOf(s); return PALETTE[i%PALETTE.length]; }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function trim(s,n){ return s.length>n?s.slice(0,n)+'…':s; }
function fmtDate(d){ return d?d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'—'; }
function monthLabel(m){ const [y,mo]=m.split('-'); const n=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return n[parseInt(mo)-1]+" '"+y.slice(2); }
function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); charts={}; }
function val(id){ const e=document.getElementById(id); return e?e.value:''; }
function quoteHtml(d){ return '<div class="quote'+(d.sentiment==='neg'?' detractor':'')+'">“'+escapeHtml(d.comment)+'”<div class="meta">'+escapeHtml(d.survey)+(d.date?' · '+fmtDate(d.date):'')+(d.instructor!=='Not mentioned'?' · '+d.instructor:'')+'</div></div>'; }

function renderAll(){
  buildRecords();
  const content=document.getElementById('content');
  if(!RECORDS.length){ content.innerHTML='<div class="card"><div class="empty">The sheet has no data rows yet.</div></div>'; return; }
  const stamp=LOADED_AT?('Updated '+LOADED_AT.toLocaleString('en-US')):'';
  content.innerHTML='<div class="toolbar"><label for="dateFilter">Time range</label><select id="dateFilter">'+DATE_OPTS.map(o=>'<option value="'+o[0]+'"'+(o[0]===DATE_FILTER?' selected':'')+'>'+o[1]+'</option>').join('')+'</select><span class="ai-note" id="rangeCount" style="margin:0"></span><span style="flex:1"></span><button class="btn ghost" id="refreshBtn">↻ Refresh</button><span class="ai-note" style="margin:0">'+stamp+'</span></div><div id="results"></div>';
  document.getElementById('dateFilter').addEventListener('change',e=>{DATE_FILTER=e.target.value;renderResults();});
  document.getElementById('refreshBtn').addEventListener('click',loadData);
  renderResults();
}
function renderResults(){
  applyDateFilter(); destroyCharts(); selectedProf=null;
  const results=document.getElementById('results'); const rc=document.getElementById('rangeCount'); if(rc)rc.textContent=FRECORDS.length+' responses in range';
  if(!FRECORDS.length){ results.innerHTML='<div class="card"><div class="empty">No responses in this time range.</div></div>'; document.getElementById('period').textContent=''; return; }
  results.innerHTML=modulesLayout();
  renderKpis(); renderSurveyChart(); renderVolChart(); renderTrendChart(); renderHighlightsFallback(); renderBrag(); renderInstructors(); renderThemes(); renderDetractorsPraises(); wireExplorer(); renderTable();
  LAST_RECS=STATIC_RECS.slice(); LAST_RECS._summary=STATIC_SUMMARY; renderRecs();
}
function modulesLayout(){
  return '<div class="kpis" id="kpis"></div>'+
  '<div class="card"><h2>Highlights</h2><div class="grid2"><div><div class="hl-head pos">✅ What\'s working</div><ul id="hlGood" class="hl"></ul></div><div><div class="hl-head neg">🔧 What needs improvement</div><ul id="hlBad" class="hl"></ul></div></div></div>'+
  '<div class="grid2"><div class="card"><h2>Satisfaction by survey</h2><div class="chart-box"><canvas id="hubChart"></canvas></div></div><div class="card"><h2>Responses over time</h2><div class="chart-box"><canvas id="volChart"></canvas></div></div></div>'+
  '<div class="card"><h2>Satisfaction trend</h2><div class="chart-box"><canvas id="trendChart"></canvas></div></div>'+
  '<div class="card"><h2>Recommendations — how to fix each gap</h2><p class="ai-note" style="margin-top:-6px">Consultant guidance on the recurring gaps. Click any card to see related comments in the current range.</p><div id="recs"></div></div>'+
  '<div class="card"><h2>⭐ Professor brag sheets</h2><div id="brag"></div><div id="bragDetail"></div><p class="ai-note">Click a professor to see every verbatim mention, then "Copy quotes".</p></div>'+
  '<div class="card"><h2>Instructor performance</h2><div id="instructors"></div></div>'+
  '<div class="card"><h2>Recurring themes</h2><div id="themes"></div></div>'+
  '<div class="grid2"><div class="card"><h2>⚠️ Needs improvement — act first</h2><div id="detractors"></div></div><div class="card"><h2>⭐ Standout praise</h2><div id="praises"></div></div></div>'+
  '<div class="card"><h2>Comment explorer</h2><div class="controls"><select id="fHub"><option value="">All surveys</option>'+SURVEYS.map(s=>'<option value="'+escapeHtml(s)+'">'+escapeHtml(s)+'</option>').join('')+'</select><select id="fSent"><option value="">All sentiment</option><option value="pos">Satisfied</option><option value="neg">Needs improvement</option></select><select id="fInst"><option value="">All instructors</option></select><input id="fText" type="text" placeholder="Search comments…"></div><div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Survey</th><th>Sentiment</th><th>Instructor</th><th>Comment</th></tr></thead><tbody id="rows"></tbody></table></div><p class="ai-note" id="rowcount"></p></div>';
}
function renderKpis(){ const total=FRECORDS.length,pos=FRECORDS.filter(d=>d.sentiment==='pos').length,neg=FRECORDS.filter(d=>d.sentiment==='neg').length,pct=total?Math.round(pos/total*100):0; const dates=FRECORDS.filter(d=>d.date).map(d=>d.date); const min=dates.length?new Date(Math.min(...dates)):null,max=dates.length?new Date(Math.max(...dates)):null; document.getElementById('period').textContent=(min&&max)?'· '+fmtDate(min)+' – '+fmtDate(max):''; const k=[{v:total,l:'Total responses'},{v:pct+'%',l:'Overall satisfaction',s:pos+' satisfied of '+total},{v:neg,l:'Needs improvement',s:'Below the top CSAT rating'},{v:SURVEYS.length,l:'Surveys in range'}]; document.getElementById('kpis').innerHTML=k.map(x=>'<div class="kpi"><div class="v">'+x.v+'</div><div class="l">'+x.l+'</div>'+(x.s?'<div class="s">'+x.s+'</div>':'')+'</div>').join(''); }
function renderSurveyChart(){ const data=SURVEYS.map(s=>{const rs=FRECORDS.filter(r=>r.survey===s);const pos=rs.filter(r=>r.sentiment==='pos').length;return{label:s,color:surveyColor(s),pct:rs.length?Math.round(pos/rs.length*100):0,n:rs.length};}); charts.hub=new Chart(document.getElementById('hubChart'),{type:'bar',data:{labels:data.map(d=>trim(d.label,22)+' ('+d.n+')'),datasets:[{label:'% satisfied',data:data.map(d=>d.pct),backgroundColor:data.map(d=>d.color)}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}},plugins:{legend:{display:false}}}}); }
function monthsAgg(){ const map={}; FRECORDS.filter(d=>d.month).forEach(d=>{map[d.month]=map[d.month]||{pos:0,neu:0,neg:0,total:0};map[d.month].total++;map[d.month][d.sentiment]++;}); return Object.keys(map).sort().map(m=>({month:m,...map[m]})); }
function renderVolChart(){ const m=monthsAgg(); if(!m.length)return; charts.vol=new Chart(document.getElementById('volChart'),{type:'bar',data:{labels:m.map(x=>monthLabel(x.month)),datasets:[{label:'Satisfied',data:m.map(x=>x.pos),backgroundColor:'#00bda5',stack:'s'},{label:'Neutral',data:m.map(x=>x.neu),backgroundColor:'#cbd6e2',stack:'s'},{label:'Needs improvement',data:m.map(x=>x.neg),backgroundColor:'#e74c3c',stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,ticks:{precision:0}}},plugins:{legend:{position:'bottom'}}}}); }
function renderTrendChart(){ const m=monthsAgg(); if(!m.length)return; charts.trend=new Chart(document.getElementById('trendChart'),{type:'line',data:{labels:m.map(x=>monthLabel(x.month)),datasets:[{label:'% satisfaction',data:m.map(x=>x.total?Math.round(x.pos/x.total*100):null),borderColor:'#ff7a59',backgroundColor:'rgba(255,122,89,.12)',fill:true,tension:.3,spanGaps:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}},plugins:{legend:{display:false}}}}); }
function renderInstructors(){ const map={}; FRECORDS.forEach(d=>{map[d.instructor]=map[d.instructor]||{pos:0,total:0};map[d.instructor].total++;if(d.sentiment==='pos')map[d.instructor].pos++;}); const rows=Object.keys(map).map(k=>({name:k,...map[k],pct:map[k].total?Math.round(map[k].pos/map[k].total*100):0})).sort((a,b)=>b.total-a.total); const max=Math.max(...rows.map(r=>r.total),1); document.getElementById('instructors').innerHTML=rows.map(r=>'<div class="bar-row"><div class="name">'+escapeHtml(r.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(r.total/max*100)+'%"></div></div><div class="num">'+r.total+' resp · '+r.pct+'%</div></div>').join(''); const sel=document.getElementById('fInst'); rows.forEach(r=>{if(r.name==='Not mentioned')return;const o=document.createElement('option');o.value=r.name;o.textContent=r.name;sel.appendChild(o);}); }
function computeThemes(){ return THEMES.map(t=>{let pos=0,neg=0,total=0;FRECORDS.forEach(d=>{if(!d.comment)return;const c=d.comment.toLowerCase();if(t.kw.some(k=>c.includes(k))){total++;if(d.sentiment==='pos')pos++;if(d.sentiment==='neg')neg++;}});return{key:t.key,total,pos,neg};}).filter(t=>t.total>0); }
function renderThemes(){ const out=computeThemes().sort((a,b)=>b.total-a.total); const max=Math.max(...out.map(t=>t.total),1); document.getElementById('themes').innerHTML=out.map(t=>{const neg=t.neg>t.pos*0.4;return'<div class="bar-row"><div class="name">'+t.key+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(t.total/max*100)+'%;background:'+(neg?'#e74c3c':'#ff7a59')+'"></div></div><div class="num">'+t.total+' mentions</div></div>';}).join('')||'<span class="muted">No themes detected.</span>'; }
function renderHighlightsFallback(){ const good=document.getElementById('hlGood'),bad=document.getElementById('hlBad'),th=computeThemes(); const w=th.filter(t=>t.pos>=t.neg).sort((a,b)=>b.pos-a.pos).slice(0,5).map(t=>t.key+' — praised in '+t.pos+' comment'+(t.pos!==1?'s':'')); const im=th.filter(t=>t.neg>0).sort((a,b)=>b.neg-a.neg).slice(0,5).map(t=>t.key+' — flagged in '+t.neg+' comment'+(t.neg!==1?'s':'')); good.innerHTML=w.length?w.map(x=>'<li>'+escapeHtml(x)+'</li>').join(''):'<li class="muted">No clear positive themes yet.</li>'; bad.innerHTML=im.length?im.map(x=>'<li>'+escapeHtml(x)+'</li>').join(''):'<li class="muted">No clear improvement areas yet.</li>'; }
function renderDetractorsPraises(){ const det=FRECORDS.filter(d=>d.sentiment==='neg'&&d.comment).slice(0,8); const pra=FRECORDS.filter(d=>d.sentiment==='pos'&&d.comment).slice(0,6); document.getElementById('detractors').innerHTML=det.length?det.map(d=>'<div class="quote detractor">“'+escapeHtml(trim(d.comment,260))+'”<div class="meta">'+escapeHtml(d.survey)+(d.date?' · '+fmtDate(d.date):'')+(d.instructor!=='Not mentioned'?' · '+d.instructor:'')+'</div></div>').join(''):'<span class="muted">No lower-rated comments in this range. 🎉</span>'; document.getElementById('praises').innerHTML=pra.map(d=>'<div class="quote">“'+escapeHtml(trim(d.comment,220))+'”<div class="meta">'+escapeHtml(d.survey)+(d.date?' · '+fmtDate(d.date):'')+(d.instructor!=='Not mentioned'?' · '+d.instructor:'')+'</div></div>').join(''); }
function profData(){ return PROFS.map(name=>{const rx=new RegExp('\\b'+escapeReg(name)+'\\b','i');return{name,hits:FRECORDS.filter(d=>d.comment&&rx.test(d.comment))};}).filter(b=>b.hits.length>0).sort((a,b)=>b.hits.length-a.hits.length); }
function renderBrag(){ const box=document.getElementById('brag'); const blocks=profData(); if(blocks.length){ box.innerHTML='<div class="profgrid">'+blocks.map(b=>{const pos=b.hits.filter(h=>h.sentiment==='pos').length;const pct=Math.round(pos/b.hits.length*100);return'<div class="profbox'+(selectedProf===b.name?' sel':'')+'" data-name="'+escapeHtml(b.name)+'"><div class="pname">'+escapeHtml(b.name)+'</div><div class="pmeta">'+b.hits.length+' mention'+(b.hits.length!==1?'s':'')+' · '+pct+'% positive</div><div class="pbar"><div style="width:'+pct+'%"></div></div></div>';}).join('')+'</div>'; box.querySelectorAll('.profbox').forEach(el=>el.addEventListener('click',()=>{selectedProf=(selectedProf===el.dataset.name)?null:el.dataset.name;box.querySelectorAll('.profbox').forEach(x=>x.classList.toggle('sel',x.dataset.name===selectedProf));renderBragDetail();})); } else { box.innerHTML='<span class="muted">No tracked professor names matched in this range.</span>'; } renderBragDetail(); }
function renderBragDetail(){ const det=document.getElementById('bragDetail'); if(!det)return; if(!selectedProf){det.innerHTML='<span class="muted" style="font-size:12.5px">Select a professor above to see their comments.</span>';return;} const b=profData().find(x=>x.name===selectedProf); if(!b){det.innerHTML='';return;} const pos=b.hits.filter(h=>h.sentiment==='pos').length;const pct=Math.round(pos/b.hits.length*100); det.innerHTML='<div class="brag-detail-head"><span><strong>'+escapeHtml(b.name)+'</strong> · '+b.hits.length+' mention'+(b.hits.length!==1?'s':'')+' · '+pct+'% positive</span><button class="btn ghost copy" id="copyProf">Copy quotes</button></div>'+b.hits.map(quoteHtml).join(''); document.getElementById('copyProf').addEventListener('click',function(){const text=b.name+' — workshop feedback mentions\n\n'+b.hits.map(h=>'• "'+h.comment+'"  ('+h.survey+(h.date?', '+fmtDate(h.date):'')+')').join('\n');copyText(text,this);}); }
function copyText(text,btn){ const orig=btn.textContent; const done=()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1500);}; if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fb());}else fb(); function fb(){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(ta);} }
let filtered=[];
function wireExplorer(){ ['fHub','fSent','fInst','fText'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',renderTable);}); }
function renderTable(){ const hub=val('fHub'),sent=val('fSent'),inst=val('fInst'),txt=(val('fText')||'').toLowerCase(); filtered=FRECORDS.filter(d=>{if(hub&&d.survey!==hub)return false;if(sent&&d.sentiment!==sent)return false;if(inst&&d.instructor!==inst)return false;if(txt&&!(d.comment||'').toLowerCase().includes(txt))return false;return true;}); document.getElementById('rows').innerHTML=filtered.slice(0,400).map(d=>'<tr><td>'+fmtDate(d.date)+'</td><td>'+escapeHtml(d.survey)+'</td><td><span class="pill '+d.sentiment+'">'+(d.sentiment==='pos'?'Satisfied':d.sentiment==='neg'?'Needs improvement':'Neutral')+'</span></td><td>'+(d.instructor==='Not mentioned'?'<span class="muted">—</span>':escapeHtml(d.instructor))+'</td><td class="cmt">'+(d.comment?escapeHtml(d.comment):'<span class="muted">(no comment)</span>')+'</td></tr>').join(''); document.getElementById('rowcount').textContent=filtered.length+' of '+FRECORDS.length+' responses'+(filtered.length>400?' (showing first 400)':''); }
function relatedComments(survey){ let rel=FRECORDS.filter(d=>d.comment&&d.sentiment==='neg'&&(!survey||survey==='All'||d.survey===survey)); if(!rel.length)rel=FRECORDS.filter(d=>d.comment&&d.sentiment==='neg'); return rel; }
function renderRecs(){ const box=document.getElementById('recs'); if(!box)return; if(!LAST_RECS.length){box.innerHTML='<span class="muted">No recommendations.</span>';return;} box.innerHTML=(LAST_RECS._summary?'<p style="margin:0 0 14px;color:#42526b;font-weight:500">'+escapeHtml(LAST_RECS._summary)+'</p>':'')+'<div class="recgrid">'+LAST_RECS.map((r,i)=>{const pr=(r.priority||'').toLowerCase();const cls=pr==='high'?'high':pr==='medium'?'medium':'low';const rel=relatedComments(r.survey);return'<div class="recbox '+cls+'" data-i="'+i+'"><div class="recbox-head"><span class="prio-pill '+cls+'">'+escapeHtml(r.priority||'')+'</span><span class="rectitle">'+escapeHtml(r.title||'')+'</span></div>'+(r.area?'<div class="recwhy">Addresses: '+escapeHtml(r.area)+(r.survey?' · '+escapeHtml(r.survey):'')+'</div>':'')+'<div class="recdetail-text">'+escapeHtml(r.detail||'')+'</div><div class="recmore">▸ View '+rel.length+' related comment'+(rel.length!==1?'s':'')+'</div><div class="rec-detail" id="recd-'+i+'"></div></div>';}).join('')+'</div>'; box.querySelectorAll('.recbox').forEach(el=>el.addEventListener('click',()=>{const i=el.dataset.i;const panel=document.getElementById('recd-'+i);if(panel.style.display==='block'){panel.style.display='none';return;}const rel=relatedComments(LAST_RECS[i].survey);panel.innerHTML=rel.length?rel.map(quoteHtml).join(''):'<span class="muted">No lower-rated comments to show.</span>';panel.style.display='block';})); }

async function loadData(){
  const content=document.getElementById('content');
  content.innerHTML='<div class="card"><div class="empty"><span class="spinner"></span>Loading latest data from the team sheet…</div></div>';
  try{
    const res=await fetch(SHEET_CSV_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2) throw new Error('empty');
    FILE={headers:rows[0],rows:rows.slice(1),map:detectMap(rows[0])};
    LOADED_AT=new Date();
    renderAll();
  }catch(e){
    content.innerHTML='<div class="card"><div class="err"><strong>Could not load the data sheet.</strong><br>'+
      'Make sure the Google Sheet is still <em>Published to web</em> as CSV and the link is correct.<br>'+
      'Technical detail: '+escapeHtml(e.message||String(e))+'</div></div>';
  }
}
loadData();
</script>
